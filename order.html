<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order</title>
    <link rel="stylesheet" href="css/order.css">
</head>
<body>

<form>

    <!-- NAME -->
    <div class="field">
        <label for="name">Ditt namn</label><br>
        <input type="text" id="name" name="name" placeholder="Ditt namn">
    </div>

    <!-- TJÄNST -->
    <div class="section-tjanst">
        <p class="section-title">Välj Tjänst</p>

        <div class="radio-row">
            <label><input type="radio" name="Tjänst" value="bogsering"> Bogsering</label>
            <label><input type="radio" name="Tjänst" value="bryggning"> Bryggning</label>
            <label><input type="radio" name="Tjänst" value="handläggning"> Handläggning</label>
        </div>

        <!-- KUNDTYP -->
        <div class="section-kundtyp">
            <p class="section-title">Typ av kund</p>

            <div class="radio-row">
                <label><input type="radio" name="kundTyp" value="privat"> Privat</label>
                <label><input type="radio" name="kundTyp" value="företag"> Företag</label>
            </div>

            <div class="section-anstallda">
                <p class="section-title">Antal Anställda</p>

                <div class="radio-row">
                    <label><input type="radio" name="hiredwork" value="1-100"> 1-100</label>
                    <label><input type="radio" name="hiredwork" value="101-1000"> 101-1000</label>
                    <label><input type="radio" name="hiredwork" value=">1000"> >1000</label>
                </div>
            </div>
        </div>
    </div>

    <!-- HANTVERKARE -->
    <div class="section-hantverkare">
        <p class="section-title">Välj hantverkare</p>

        <div class="hantverkare-row">
            <label class="hantverkare-label">
                <input type="radio" name="Tjänsteman" value="josh">
                Josh <br>
                <img src="pictures/Josh.jpg" alt="Josh">
            </label>

            <label class="hantverkare-label">
                <input type="radio" name="Tjänsteman" value="olle">
                Olle <br>
                <img src="pictures/Olle.jpg" alt="Olle">
            </label>

            <label class="hantverkare-label">
                <input type="radio" name="Tjänsteman" value="sigge">
                Sigge <br>
                <img src="pictures/sigge.jpg" alt="Sigge">
            </label>
        </div>
    </div>

    <!-- DATE + DAYS -->
    <div class="field">
        <label>Datum:</label><br>
        <input type="date" name="thedate">
    </div>

    <div class="field">
        <label>Antal dagar</label><br>
        <input type="number" name="antal" min="1" max="10" step="1">
    </div>

    <!-- CONTACT -->
    <div class="field">
        <label>E-post</label><br>
        <input type="email" name="epost" placeholder="example@email.com" required>
    </div>

    <div class="field">
        <label>Adress</label><br>
        <input type="text" name="adress" placeholder="Svangränd 1" required>
    </div>

    <div class="field">
        <label>Telefon</label><br>
        <input type="tel" name="telnum" placeholder="070-123 45 67" required>
    </div>

    <div class="field">
        <textarea id="expectations" name="expectations" rows="5" cols="80" placeholder="Önskemål, frågor eller saker vi behöver veta..."></textarea>
    </div>

    <br>

    <!-- BUTTON -->
    <div class="submit-section">
        <div class="nyhetsbrev-row">
            <p>Nyhetsbrev?</p>
            <label><input type="radio" name="nyhetsbrev" value="jaNyheter" required> Ja</label>
            <label><input type="radio" name="nyhetsbrev" value="nejNyheter"> Nej</label>
        </div>

        <br>

        <div class="submit-row">
            <input type="submit" value="Skicka">
            <a href="index.html">StartSida</a>
        </div>
    </div>

</form>

</body>
</html>
